<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scoreboard</title>
<meta name="theme-color" content="#050507"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Scoreboard"/>


<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050507;--surface:#0e1017;--surface2:#151822;--surface3:#1c2130;
  --border:rgba(80,140,255,0.10);--border2:rgba(80,140,255,0.22);
  --accent:#3b82f6;--accent2:#60a5fa;--accentglow:rgba(59,130,246,0.28);
  --text:#e8eef8;--muted:rgba(180,200,240,0.38);--radius:18px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 14px 80px;overflow-x:hidden}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(120px);opacity:0.18;pointer-events:none;z-index:0}
body::before{width:560px;height:560px;background:radial-gradient(circle,#1d4ed8,transparent 70%);top:-200px;left:-180px}
body::after{width:440px;height:440px;background:radial-gradient(circle,#0ea5e9,transparent 70%);bottom:-140px;right:-160px}

/* HEADER */
header{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin-bottom:22px;animation:fadeDown .5s ease both}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.logo-pill{background:linear-gradient(120deg,#1d4ed8 0%,#38bdf8 55%,#1d4ed8 100%);background-size:200% 100%;animation:shimmer 5s linear infinite;border-radius:100px;padding:5px 24px 7px;margin-bottom:6px;box-shadow:0 0 32px rgba(59,130,246,0.35)}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.logo-text{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:#fff;letter-spacing:6px;line-height:1}
.tagline{font-size:10px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--muted)}

/* NAV */
.nav-tabs{position:relative;z-index:10;display:flex;gap:4px;background:rgba(14,16,23,0.85);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:13px;padding:4px;margin-bottom:20px;width:100%;max-width:540px}
.nav-tab{flex:1;padding:9px 8px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;white-space:nowrap}
.nav-tab.active{background:rgba(59,130,246,0.18);color:var(--accent2);border:1px solid rgba(59,130,246,0.25)}
.nav-tab:hover:not(.active){color:var(--text)}

/* SHARED */
.page{width:100%;max-width:540px;position:relative;z-index:1}
.page.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{background:rgba(14,16,23,0.7);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius)}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block}
.section-gap{margin-bottom:20px}

/* BUTTONS */
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1d4ed8,#38bdf8);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 24px rgba(59,130,246,.3);transition:opacity .2s,transform .15s}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(1px)}
.btn-secondary{padding:12px 16px;border-radius:11px;border:1px solid var(--border);background:rgba(59,130,246,0.08);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-secondary:hover{background:rgba(59,130,246,0.16);color:var(--text)}
.btn-green{background:linear-gradient(135deg,#1d4ed8,#38bdf8);color:#fff;border:none;padding:13px;border-radius:12px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 20px rgba(59,130,246,.28);transition:opacity .2s,transform .15s}
.btn-green:hover{opacity:.85;transform:translateY(-1px)}
.btn-green:active{transform:translateY(1px)}

/* ═══════════════════════════════
   PROFILES PAGE
═══════════════════════════════ */
#page-profiles{animation:fadeUp .4s ease both}
.profile-toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.profile-toolbar h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;flex:1}
.btn-add-profile{padding:9px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#1d4ed8,#38bdf8);color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;white-space:nowrap;transition:opacity .2s;box-shadow:0 4px 16px rgba(59,130,246,.25)}
.btn-add-profile:hover{opacity:.85}

.profiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.profile-tile{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;transition:border-color .2s}
.profile-tile:hover{border-color:var(--border2)}
.profile-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-tile-name{font-size:13px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.profile-tile-actions{display:flex;gap:6px}
.ptile-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.ptile-btn:hover{border-color:var(--border2);color:var(--text)}
.ptile-btn.danger:hover{border-color:rgba(239,68,68,.4);color:#ef4444;background:rgba(239,68,68,.08)}
.profiles-empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;line-height:1.8}
.profiles-empty .big{font-size:36px;margin-bottom:10px}

/* ═══════════════════════════════
   PROFILE MODAL (create/edit)
═══════════════════════════════ */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:22px;padding:26px 22px;width:100%;max-width:360px;box-shadow:0 24px 80px rgba(0,0,0,.7);transform:scale(.94) translateY(10px);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:18px}

/* photo upload */
.photo-upload-area{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px}
.photo-preview{width:80px;height:80px;border-radius:50%;background:var(--surface2);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:border-color .2s;position:relative}
.photo-preview:hover{border-color:rgba(255,255,255,.3)}
.photo-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.photo-preview .photo-placeholder{font-size:28px;color:var(--muted)}
.photo-upload-input{display:none}
.photo-upload-btn{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;transition:all .2s}
.photo-upload-btn:hover{color:var(--text);border-color:var(--border2)}

.modal-field{margin-bottom:14px}
.modal-label{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
.modal-input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;outline:none;transition:border-color .2s}
.modal-input:focus{border-color:var(--border2)}

/* color palette in modal */
.color-palette{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.pal-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.pal-swatch:hover{transform:scale(1.18)}
.pal-swatch.selected{border-color:#fff}

.modal-btns{display:flex;gap:8px;margin-top:18px}
.modal-btn-cancel{flex:1;padding:12px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.modal-btn-cancel:hover{background:var(--surface3);color:var(--text)}
.modal-btn-confirm{flex:2;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#1d4ed8,#38bdf8);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.modal-btn-confirm:hover{opacity:.85}

/* ═══════════════════════════════
   SETUP PAGE
═══════════════════════════════ */
#page-setup{animation:fadeUp .4s ease both}
.setup-card{padding:24px 20px;margin-bottom:0}

/* game picker */
.game-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.game-btn{padding:14px 10px;border-radius:13px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all .2s;display:flex;flex-direction:column;gap:4px}
.game-btn .g-icon{font-size:24px}
.game-btn .g-name{font-weight:700;color:var(--text);font-size:14px}
.game-btn .g-desc{font-size:10px;color:var(--muted);line-height:1.3}
.game-btn.active{border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.1);box-shadow:0 0 18px rgba(59,130,246,.1)}
.game-btn:hover:not(.active){border-color:var(--border2)}

/* variant dropdown */
.variant-select-wrap{position:relative;margin-bottom:20px}
.variant-select{width:100%;padding:12px 38px 12px 14px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;outline:none;cursor:pointer;appearance:none;transition:border-color .2s}
.variant-select:focus{border-color:var(--border2)}
.variant-select option{background:#0e1017;color:#e8eef8}
.select-arrow{position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:12px}

/* player bank */
.bank-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bank-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
.bank-scroll::-webkit-scrollbar{display:none}
.bank-player{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;min-width:60px;padding:4px;border-radius:11px;border:2px solid transparent;transition:all .2s;position:relative}
.bank-player.selected{border-color:rgba(255,255,255,.3);background:var(--surface2)}
.bank-player:hover:not(.selected){background:var(--surface2)}
.bank-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.bank-avatar img{width:100%;height:100%;object-fit:cover}
.bank-name{font-size:10px;font-weight:600;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px}
.bank-player.selected .bank-name{color:var(--text)}
.bank-check{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;display:none}
.bank-player.selected .bank-check{display:flex}
.bank-empty{color:var(--muted);font-size:12px;padding:10px 0}

/* selected players preview */
.selected-preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;min-height:36px}
.sel-chip{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:100px;background:var(--surface2);border:1px solid var(--border2);font-size:12px;font-weight:600}
.sel-chip-avatar{width:24px;height:24px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.sel-chip-avatar img{width:100%;height:100%;object-fit:cover}
.sel-chip-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;line-height:1;transition:color .2s}
.sel-chip-remove:hover{color:#ef4444}

/* ═══════════════════════════════
   GAME PAGE
═══════════════════════════════ */
#page-game{display:none;animation:fadeUp .4s ease both}

.game-header-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(14,16,23,0.7);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:13px;padding:12px 15px;margin-bottom:10px}
.ghb-left{display:flex;flex-direction:column;gap:2px}
.ghb-game-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.ghb-variant{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:2px;text-transform:uppercase}
.ghb-right{display:flex;gap:8px;align-items:center}

.dir-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(14,16,23,0.7);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:13px;padding:12px 15px;margin-bottom:10px}
.dir-meta{display:flex;flex-direction:column;gap:2px}
.dir-value{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.dir-icon{font-size:22px;transition:transform .45s cubic-bezier(.34,1.56,.64,1)}
.dir-icon.flipped{transform:scaleX(-1)}
.dir-reverse-btn{padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s}
.dir-reverse-btn:hover{background:var(--surface3)}

.meta-bar{display:flex;gap:8px;margin-bottom:10px}
.meta-tile{flex:1;background:rgba(14,16,23,0.7);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:3px}
.meta-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta-value.sm{font-size:13px}

/* player cards grid — responsive */
.players-grid{display:grid;gap:10px;margin-bottom:10px}
.players-grid.cols-2{grid-template-columns:1fr 1fr}
.players-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.players-grid.cols-4{grid-template-columns:1fr 1fr}
.players-grid.cols-5,.players-grid.cols-6{grid-template-columns:1fr 1fr 1fr}
.players-grid.cols-7,.players-grid.cols-8{grid-template-columns:1fr 1fr 1fr 1fr}

.player-card{background:rgba(14,16,23,0.65);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:16px;padding:14px 12px 12px;position:relative;overflow:hidden;transition:transform .35s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .3s}
.player-card.active-turn{border-color:rgba(59,130,246,.35);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 20px rgba(59,130,246,.12)}
.card-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.card-glow{position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none}
.player-card.active-turn .card-glow{opacity:.055}
.active-dot{position:absolute;top:11px;right:11px;width:7px;height:7px;border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

.pc-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;margin-bottom:6px;flex-shrink:0}
.pc-avatar img{width:100%;height:100%;object-fit:cover}
.p-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-score{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;line-height:1;margin-bottom:1px}
@keyframes popNum{from{transform:scale(.7);opacity:.4}to{transform:scale(1);opacity:1}}
.p-score-lbl{font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* UNO action button */
.add-win-btn{width:100%;padding:7px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:background .2s,transform .15s}
.add-win-btn:active{transform:scale(.97)}

/* Rummy score input row */
.rummy-input-row{display:flex;gap:5px;align-items:center}
.rummy-pts-input{flex:1;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-align:center;outline:none;width:100%;min-width:0}
.rummy-pts-input:focus{border-color:var(--border2)}
.rummy-add-btn{padding:6px 9px;border-radius:8px;border:none;background:rgba(255,255,255,.09);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;flex-shrink:0}
.rummy-add-btn:hover{background:rgba(255,255,255,.16)}

.action-row{display:flex;gap:8px;margin-bottom:10px}
.action-row .btn-green{flex:1}

/* ═══════════════════════════════
   END GAME MODAL
═══════════════════════════════ */
.end-modal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:5px}
.end-modal-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.end-winner-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:11px;margin-bottom:6px}
.ewr-left{display:flex;align-items:center;gap:9px}
.ewr-avatar{width:34px;height:34px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.ewr-avatar img{width:100%;height:100%;object-fit:cover}
.ewr-name{font-size:13px;font-weight:600}
.ewr-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:100px;text-transform:uppercase;margin-left:6px}
.ewr-score{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}

/* ═══════════════════════════════
   HISTORY PAGE
═══════════════════════════════ */
#page-history{animation:fadeUp .4s ease both}
.history-empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;line-height:1.8}
.history-empty .big{font-size:36px;margin-bottom:10px}
.history-date-group{margin-bottom:18px}
.history-date-label{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding:0 2px}
.history-entry{background:rgba(14,16,23,0.7);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:15px;padding:14px 16px;margin-bottom:8px;position:relative}
.hentry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hentry-badge{font-size:11px;font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:100px;background:rgba(59,130,246,.12);color:var(--accent2);border:1px solid rgba(59,130,246,.18)}
.hentry-meta{font-size:11px;color:var(--muted)}
.hentry-players{display:flex;flex-direction:column;gap:5px}
.hentry-row{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;border-radius:8px;background:var(--surface2)}
.hentry-left{display:flex;align-items:center;gap:7px}
.hentry-avatar{width:24px;height:24px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0}
.hentry-avatar img{width:100%;height:100%;object-fit:cover}
.hentry-name{font-size:12px;font-weight:600}
.hentry-win-tag{font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:100px;text-transform:uppercase;margin-left:5px}
.hentry-score{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.hentry-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s,background .2s}
.hentry-del:hover{color:#e8192c;background:rgba(232,25,44,.1)}
.clear-all-btn{width:100%;padding:12px;border-radius:11px;border:1px solid rgba(232,25,44,.22);background:rgba(232,25,44,.06);color:rgba(232,25,44,.65);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
.clear-all-btn:hover{background:rgba(232,25,44,.13);color:#e8192c}

/* ═══════════════════════════════
   RULES PAGE
═══════════════════════════════ */
#page-rules{animation:fadeUp .4s ease both}
.rules-game-tabs{display:flex;gap:6px;margin-bottom:10px}
.rules-game-tab{flex:1;padding:10px;border-radius:11px;border:1px solid var(--border);background:rgba(14,16,23,0.7);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.rules-game-tab .rgt-icon{font-size:20px}
.rules-game-tab .rgt-name{font-size:11px;letter-spacing:.5px}
.rules-game-tab.active{border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.1);color:var(--accent2)}
.rules-game-tab:hover:not(.active){border-color:var(--border2);color:var(--text)}

.rules-variant-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.rules-variant-tabs::-webkit-scrollbar{display:none}
.rules-variant-tab{padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:rgba(14,16,23,0.7);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.rules-variant-tab.active{border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.12);color:var(--accent2)}
.rules-variant-tab:hover:not(.active){color:var(--text);border-color:var(--border2)}

.rules-card{background:rgba(14,16,23,0.7);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px}
.rules-hero{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.rules-hero-icon{font-size:36px;flex-shrink:0}
.rules-hero-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:3px}
.rules-hero-sub{font-size:12px;color:var(--muted);line-height:1.5}

.rules-section{margin-bottom:18px}
.rules-section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rules-section-title::before{content:'';display:inline-block;width:3px;height:13px;background:var(--accent);border-radius:2px}
.rules-body{font-size:13px;line-height:1.75;color:rgba(220,232,255,0.8)}
.rules-body p{margin-bottom:8px}
.rules-body p:last-child{margin-bottom:0}

.rules-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.rules-list li{display:flex;gap:10px;font-size:13px;line-height:1.6;color:rgba(220,232,255,0.8)}
.rules-list li::before{content:'▸';color:var(--accent);flex-shrink:0;margin-top:1px}

.rules-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:2px}
.rules-card-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.rci-name{font-size:12px;font-weight:700;margin-bottom:3px}
.rci-desc{font-size:11px;color:var(--muted);line-height:1.4}

.rules-badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.rules-badge{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(59,130,246,.1);color:var(--accent2);border:1px solid rgba(59,130,246,.18)}

/* TOAST */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(24px);background:#fff;color:#000;padding:9px 22px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;white-space:nowrap;z-index:999;transition:opacity .3s,transform .35s cubic-bezier(.34,1.56,.64,1)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
</style>
</head>
<body>

<header>
  <div class="logo-pill"><div class="logo-text">SCOREBOARD</div></div>
  <div class="tagline">Card Game Tracker</div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('setup')" id="tab-setup">🎮 New Game</button>
  <button class="nav-tab" onclick="showPage('game')" id="tab-game" style="display:none">▶ In Game</button>
  <button class="nav-tab" onclick="showPage('profiles')" id="tab-profiles">👤 Players</button>
  <button class="nav-tab" onclick="showPage('history')" id="tab-history">📋 History</button>
  <button class="nav-tab" onclick="showPage('rules')" id="tab-rules">📖 Rules</button>
</div>

<!-- PROFILES -->
<div id="page-profiles" class="page hidden">
  <div class="profile-toolbar">
    <h2>Player Bank</h2>
    <button class="btn-add-profile" onclick="openProfileModal()">+ Add Player</button>
  </div>
  <div class="profiles-grid" id="profiles-grid"></div>
</div>

<!-- SETUP -->
<div id="page-setup" class="page">
  <div class="card setup-card">
    <span class="eyebrow">Choose Game</span>
    <div class="game-picker" id="game-picker"></div>

    <span class="eyebrow">Variant / Mode</span>
    <div class="variant-select-wrap section-gap">
      <select class="variant-select" id="variant-select"></select>
      <span class="select-arrow">▾</span>
    </div>

    <span class="eyebrow section-gap" style="margin-top:4px">Select Players <span style="color:var(--muted);font-size:9px">(tap to add)</span></span>
    <div class="bank-scroll" id="bank-scroll"></div>

    <span class="eyebrow">Lineup <span id="lineup-count" style="color:var(--muted)">(0)</span></span>
    <div class="selected-preview" id="selected-preview"></div>

    <button class="btn-primary" onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- GAME -->
<div id="page-game" class="page hidden">
  <div class="game-header-bar">
    <div class="ghb-left">
      <div class="ghb-game-name" id="ghb-game-name">—</div>
      <div class="ghb-variant" id="ghb-variant">—</div>
    </div>
    <div class="ghb-right">
      <button class="btn-secondary" style="padding:8px 12px;font-size:11px" onclick="endGame()">End & Save</button>
    </div>
  </div>

  <div class="dir-bar">
    <div class="dir-meta">
      <span class="eyebrow" style="margin:0">Direction</span>
      <span class="dir-value" id="dir-value">Clockwise</span>
    </div>
    <div class="dir-icon" id="dir-icon">🔁</div>
    <button class="dir-reverse-btn" onclick="reverseDir()">Reverse</button>
  </div>

  <div class="meta-bar">
    <div class="meta-tile">
      <span class="eyebrow" style="margin:0">Round</span>
      <span class="meta-value" id="round-val">1</span>
    </div>
    <div class="meta-tile">
      <span class="eyebrow" style="margin:0">Goes First</span>
      <span class="meta-value sm" id="first-val">—</span>
    </div>
  </div>

  <div class="players-grid" id="players-grid"></div>

  <div class="action-row">
    <button class="btn-green" onclick="nextRound()">Next Round →</button>
  </div>
</div>

<!-- HISTORY -->
<div id="page-history" class="page hidden">
  <div id="history-content"></div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-title" id="pmodal-title">New Player</div>
    <div class="photo-upload-area">
      <div class="photo-preview" id="photo-preview" onclick="document.getElementById('photo-file').click()">
        <span class="photo-placeholder">📷</span>
      </div>
      <input type="file" id="photo-file" class="photo-upload-input" accept="image/*"/>
      <button class="photo-upload-btn" onclick="document.getElementById('photo-file').click()">Upload Photo</button>
    </div>
    <div class="modal-field">
      <label class="modal-label">Name</label>
      <input class="modal-input" id="pmodal-name" type="text" placeholder="Enter player name" maxlength="20"/>
    </div>
    <div class="modal-field">
      <label class="modal-label">Color</label>
      <div class="color-palette" id="pmodal-palette"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeProfileModal()">Cancel</button>
      <button class="modal-btn-confirm" onclick="saveProfile()">Save Player</button>
    </div>
  </div>
</div>

<!-- RULES -->
<div id="page-rules" class="page hidden">
  <div class="rules-game-tabs" id="rules-game-tabs"></div>
  <div class="rules-variant-tabs" id="rules-variant-tabs"></div>
  <div id="rules-content"></div>
</div>

<!-- END GAME MODAL -->
<div class="modal-overlay" id="end-modal">
  <div class="modal">
    <div class="end-modal-title">Game Over!</div>
    <div class="end-modal-sub" id="end-modal-sub"></div>
    <div id="end-modal-winners"></div>
    <div class="modal-btns">
      <button class="modal-btn-confirm" onclick="saveGame()">Save to History</button>
      <button class="modal-btn-cancel" onclick="discardGame()">Discard</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const PALETTE = [
  '#e8192c','#f5be0b','#0057b8','#00a651',
  '#ff6b35','#a855f7','#06b6d4','#ec4899',
  '#f97316','#84cc16','#14b8a6','#6366f1',
  '#e11d48','#eab308','#3b82f6','#22c55e',
  '#fb923c','#c026d3','#0ea5e9','#f43f5e',
];

const GAMES = {
  uno: {
    name:'UNO', icon:'🃏',
    desc:'Classic card game',
    scoring:'wins',
    variants:[
      {id:'classic',name:'UNO Classic',desc:'Original rules'},
      {id:'nomercy',name:'No Mercy',desc:'Stack +4s, brutal draws'},
      {id:'flip',name:'UNO Flip',desc:'Light & dark sides'},
      {id:'attack',name:'UNO Attack',desc:'Card launcher chaos'},
      {id:'dos',name:'UNO DOS',desc:'Two discard piles'},
      {id:'wild',name:'UNO Wild',desc:'All wild cards'},
    ]
  },
  rummy: {
    name:'Rummy', icon:'♠️',
    desc:'Classic rummy',
    scoring:'points',
    variants:[
      {id:'standard',name:'Standard Rummy',desc:'Classic rules'},
      {id:'gin',name:'Gin Rummy',desc:'Two-player classic'},
      {id:'500',name:'Rummy 500',desc:'First to 500 wins'},
      {id:'oklahoma',name:'Oklahoma Gin',desc:'Wild card variant'},
      {id:'liverpool',name:'Liverpool Rummy',desc:'Contract variant'},
    ]
  }
};

// ── STORAGE ──
function getProfiles(){ try{return JSON.parse(localStorage.getItem('cgt_profiles')||'[]')}catch{return[]} }
function saveProfiles(p){ localStorage.setItem('cgt_profiles',JSON.stringify(p)) }
function getHistory(){ try{return JSON.parse(localStorage.getItem('cgt_history')||'[]')}catch{return[]} }
function saveHistory(h){ localStorage.setItem('cgt_history',JSON.stringify(h)) }

// ── STATE ──
let selectedGame = 'uno';
let selectedVariantId = 'classic';
let selectedPlayerIds = []; // ids of chosen players for game
let gameState = null;
let editingProfileId = null;
let pendingPhotoData = null; // base64

// ══════════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════════
function showPage(id){
  ['setup','game','profiles','history','rules'].forEach(p=>{
    document.getElementById('page-'+p).classList.toggle('hidden',p!==id);
  });
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.classList.toggle('active', t.id==='tab-'+id);
  });
  if(id==='profiles') renderProfiles();
  if(id==='history') renderHistory();
  if(id==='setup') renderSetup();
  if(id==='rules') renderRules();
}

// ══════════════════════════════════════════════
// PROFILES
// ══════════════════════════════════════════════
function renderProfiles(){
  const profiles = getProfiles();
  const grid = document.getElementById('profiles-grid');
  grid.innerHTML = '';
  if(!profiles.length){
    grid.innerHTML=`<div class="profiles-empty"><div class="big">👤</div>No players yet.<br>Add players to build your bank!</div>`;
    return;
  }
  profiles.forEach(p=>{
    const tile = document.createElement('div'); tile.className='profile-tile';
    tile.innerHTML=`
      ${avatarHTML(p,60,'profile-avatar')}
      <div class="profile-tile-name">${p.name}</div>
      <div class="profile-tile-actions">
        <button class="ptile-btn" onclick="openProfileModal('${p.id}')">Edit</button>
        <button class="ptile-btn danger" onclick="deleteProfile('${p.id}')">Delete</button>
      </div>`;
    grid.appendChild(tile);
  });
}

function avatarHTML(profile, size, cls){
  const initials = profile.name ? profile.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
  if(profile.photo){
    return `<div class="${cls}" style="width:${size}px;height:${size}px;background:${profile.color}"><img src="${profile.photo}" alt="${profile.name}"/></div>`;
  }
  return `<div class="${cls}" style="width:${size}px;height:${size}px;background:${profile.color};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:${Math.round(size*.32)}px;font-weight:800;color:#fff;border-radius:50%">${initials}</div>`;
}

function openProfileModal(id){
  editingProfileId = id || null;
  pendingPhotoData = null;
  const profiles = getProfiles();
  const p = id ? profiles.find(x=>x.id===id) : null;

  document.getElementById('pmodal-title').textContent = p ? 'Edit Player' : 'New Player';
  document.getElementById('pmodal-name').value = p ? p.name : '';

  // photo preview
  const prev = document.getElementById('photo-preview');
  prev.innerHTML = p && p.photo
    ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
    : `<span class="photo-placeholder">📷</span>`;

  // color palette
  let chosenColor = p ? p.color : PALETTE[0];
  const pal = document.getElementById('pmodal-palette');
  pal.innerHTML='';
  PALETTE.forEach(hex=>{
    const s=document.createElement('div');
    s.className='pal-swatch'+(hex===chosenColor?' selected':'');
    s.style.background=hex;
    s.onclick=()=>{ chosenColor=hex; pal.querySelectorAll('.pal-swatch').forEach(x=>x.classList.toggle('selected',x.style.background===hexRgb(hex)||x.getAttribute('data-hex')===hex)); s.classList.add('selected'); s.setAttribute('data-sel','1'); };
    s.setAttribute('data-hex',hex);
    pal.appendChild(s);
  });
  pal._getColor=()=>{ const sel=pal.querySelector('.pal-swatch.selected'); return sel?sel.getAttribute('data-hex'):PALETTE[0]; };

  // file input
  const fi = document.getElementById('photo-file');
  fi.value='';
  fi.onchange=()=>{
    const file=fi.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
      pendingPhotoData=e.target.result;
      prev.innerHTML=`<img src="${pendingPhotoData}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    };
    reader.readAsDataURL(file);
  };

  document.getElementById('profile-modal').classList.add('open');
}

function closeProfileModal(){ document.getElementById('profile-modal').classList.remove('open'); editingProfileId=null; pendingPhotoData=null; }

function saveProfile(){
  const name=document.getElementById('pmodal-name').value.trim();
  if(!name){ showToast('Please enter a name'); return; }
  const pal=document.getElementById('pmodal-palette');
  const color=pal._getColor ? pal._getColor() : PALETTE[0];
  const profiles=getProfiles();
  if(editingProfileId){
    const idx=profiles.findIndex(p=>p.id===editingProfileId);
    if(idx>-1){
      profiles[idx].name=name; profiles[idx].color=color;
      if(pendingPhotoData) profiles[idx].photo=pendingPhotoData;
    }
    showToast('Player updated!');
  } else {
    profiles.push({ id:'p_'+Date.now(), name, color, photo: pendingPhotoData||null });
    showToast(`${name} added!`);
  }
  saveProfiles(profiles);
  closeProfileModal();
  renderProfiles();
  renderBankScroll();
}

function deleteProfile(id){
  if(!confirm('Delete this player?')) return;
  let profiles=getProfiles().filter(p=>p.id!==id);
  saveProfiles(profiles);
  selectedPlayerIds=selectedPlayerIds.filter(x=>x!==id);
  renderProfiles(); renderBankScroll(); renderSelectedPreview();
  showToast('Player removed');
}

// ══════════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════════
function renderSetup(){
  // game picker
  const gp=document.getElementById('game-picker');
  gp.innerHTML='';
  Object.entries(GAMES).forEach(([id,g])=>{
    const b=document.createElement('button');
    b.className='game-btn'+(id===selectedGame?' active':'');
    b.innerHTML=`<span class="g-icon">${g.icon}</span><span class="g-name">${g.name}</span><span class="g-desc">${g.desc}</span>`;
    b.onclick=()=>{ selectedGame=id; selectedVariantId=GAMES[id].variants[0].id; renderSetup(); };
    gp.appendChild(b);
  });

  // variant select
  const vs=document.getElementById('variant-select');
  vs.innerHTML='';
  GAMES[selectedGame].variants.forEach(v=>{
    const o=document.createElement('option');
    o.value=v.id; o.textContent=v.name+(v.desc?` — ${v.desc}`:'');
    if(v.id===selectedVariantId) o.selected=true;
    vs.appendChild(o);
  });
  vs.onchange=()=>{ selectedVariantId=vs.value; };

  renderBankScroll();
  renderSelectedPreview();
}

function renderBankScroll(){
  const profiles=getProfiles();
  const scroll=document.getElementById('bank-scroll');
  scroll.innerHTML='';
  if(!profiles.length){
    scroll.innerHTML=`<div class="bank-empty">No players yet — add some in the Players tab!</div>`;
    return;
  }
  profiles.forEach(p=>{
    const isSelected=selectedPlayerIds.includes(p.id);
    const el=document.createElement('div');
    el.className='bank-player'+(isSelected?' selected':'');
    el.innerHTML=`
      ${avatarHTML(p,48,'bank-avatar')}
      <div class="bank-name">${p.name}</div>
      <div class="bank-check">✓</div>`;
    el.onclick=()=>toggleBankPlayer(p.id);
    scroll.appendChild(el);
  });
}

function toggleBankPlayer(id){
  if(selectedPlayerIds.includes(id)){
    selectedPlayerIds=selectedPlayerIds.filter(x=>x!==id);
  } else {
    if(selectedPlayerIds.length>=8){ showToast('Max 8 players'); return; }
    selectedPlayerIds.push(id);
  }
  renderBankScroll();
  renderSelectedPreview();
}

function renderSelectedPreview(){
  const profiles=getProfiles();
  const preview=document.getElementById('selected-preview');
  preview.innerHTML='';
  document.getElementById('lineup-count').textContent=`(${selectedPlayerIds.length})`;
  selectedPlayerIds.forEach(id=>{
    const p=profiles.find(x=>x.id===id); if(!p) return;
    const chip=document.createElement('div'); chip.className='sel-chip';
    chip.innerHTML=`
      ${avatarHTML(p,24,'sel-chip-avatar')}
      <span>${p.name}</span>
      <button class="sel-chip-remove" onclick="toggleBankPlayer('${p.id}')">×</button>`;
    preview.appendChild(chip);
  });
}

// ══════════════════════════════════════════════
// GAME
// ══════════════════════════════════════════════
function startGame(){
  if(selectedPlayerIds.length<2){ showToast('Select at least 2 players!'); return; }
  const profiles=getProfiles();
  const game=GAMES[selectedGame];
  const variant=game.variants.find(v=>v.id===selectedVariantId)||game.variants[0];
  const players=selectedPlayerIds.map(id=>{
    const p=profiles.find(x=>x.id===id);
    return { id:p.id, name:p.name, color:p.color, photo:p.photo||null, score:0 };
  });
  gameState={ players, game:selectedGame, gameName:game.name, scoring:game.scoring,
    variantId:variant.id, variantName:variant.name, round:1, firstIdx:0, clockwise:true, startTime:Date.now() };
  document.getElementById('tab-game').style.display='';
  showPage('game');
  renderGame();
}

function renderGame(){
  const {players,gameName,variantName,round,firstIdx,clockwise,scoring}=gameState;
  document.getElementById('ghb-game-name').textContent=gameName;
  document.getElementById('ghb-variant').textContent=variantName;
  document.getElementById('dir-value').textContent=clockwise?'Clockwise':'Counter-CW';
  document.getElementById('dir-icon').classList.toggle('flipped',!clockwise);
  document.getElementById('round-val').textContent=round;
  document.getElementById('first-val').textContent=players[firstIdx].name;

  const grid=document.getElementById('players-grid');
  const n=players.length;
  grid.className='players-grid cols-'+Math.min(n,8);
  grid.innerHTML='';

  players.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='player-card'+(i===firstIdx?' active-turn':'');

    const glow=document.createElement('div'); glow.className='card-glow'; glow.style.background=p.color;
    const stripe=document.createElement('div'); stripe.className='card-stripe'; stripe.style.background=p.color;
    card.append(glow,stripe);

    if(i===firstIdx){
      const dot=document.createElement('div'); dot.className='active-dot';
      dot.style.cssText=`background:${p.color};box-shadow:0 0 0 2px ${p.color}44;`;
      card.appendChild(dot);
    }

    // avatar
    const avWrap=document.createElement('div');
    avWrap.innerHTML=avatarHTML(p,40,'pc-avatar');
    card.appendChild(avWrap.firstChild);

    const name=document.createElement('div'); name.className='p-name'; name.textContent=p.name;

    const score=document.createElement('div'); score.className='p-score'; score.style.color=p.color; score.textContent=p.score;
    const scoreLbl=document.createElement('div'); scoreLbl.className='p-score-lbl';

    if(scoring==='wins'){
      scoreLbl.textContent=p.score===1?'win':'wins';
      const btn=document.createElement('button'); btn.className='add-win-btn'; btn.textContent='+ Win';
      btn.style.cssText=`border-color:${p.color}44;color:${p.color};`;
      btn.onmouseenter=()=>btn.style.background=p.color+'1a';
      btn.onmouseleave=()=>btn.style.background='';
      btn.onclick=()=>{ p.score++; score.textContent=p.score; score.style.animation='none'; requestAnimationFrame(()=>score.style.animation='popNum .3s cubic-bezier(.34,1.56,.64,1)'); scoreLbl.textContent=p.score===1?'win':'wins'; advanceRound(`🎉 ${p.name} wins the round!`); };
      card.append(name,score,scoreLbl,btn);
    } else {
      // Rummy points
      scoreLbl.textContent='pts';
      const inputRow=document.createElement('div'); inputRow.className='rummy-input-row';
      const inp=document.createElement('input'); inp.className='rummy-pts-input'; inp.type='number'; inp.inputMode='numeric'; inp.placeholder='0'; inp.min='0';
      const addBtn=document.createElement('button'); addBtn.className='rummy-add-btn'; addBtn.textContent='+';
      addBtn.onclick=()=>{
        const val=parseInt(inp.value)||0; if(val===0) return;
        p.score+=val; inp.value='';
        score.textContent=p.score; score.style.animation='none';
        requestAnimationFrame(()=>score.style.animation='popNum .3s cubic-bezier(.34,1.56,.64,1)');
        advanceRound(`+${val} pts → ${p.name}`);
      };
      // allow Enter key
      inp.onkeydown=e=>{ if(e.key==='Enter') addBtn.click(); };
      inputRow.append(inp,addBtn);
      card.append(name,score,scoreLbl,inputRow);
    }
    grid.appendChild(card);
  });
}

function reverseDir(){
  gameState.clockwise=!gameState.clockwise;
  document.getElementById('dir-value').textContent=gameState.clockwise?'Clockwise':'Counter-CW';
  document.getElementById('dir-icon').classList.toggle('flipped',!gameState.clockwise);
  showToast(gameState.clockwise?'🔁 Now Clockwise':'🔄 Direction Reversed!');
}

function advanceRound(scoreMsg){
  gameState.round++;
  gameState.firstIdx=(gameState.firstIdx+1)%gameState.players.length;
  renderGame();
  const who=gameState.players[gameState.firstIdx].name;
  showToast(`${scoreMsg} · Now: ${who} goes first!`);
}

function nextRound(){
  gameState.round++;
  gameState.firstIdx=(gameState.firstIdx+1)%gameState.players.length;
  renderGame();
  showToast(`Round ${gameState.round} — ${gameState.players[gameState.firstIdx].name} goes first!`);
}

// ══════════════════════════════════════════════
// END GAME
// ══════════════════════════════════════════════
function endGame(){
  const {players,gameName,variantName,round,scoring}=gameState;
  const maxScore=Math.max(...players.map(p=>p.score));
  const winners=players.filter(p=>p.score===maxScore&&maxScore>0);
  document.getElementById('end-modal-sub').textContent=`${gameName} · ${variantName} · ${round} round${round!==1?'s':''}`;
  const mw=document.getElementById('end-modal-winners');
  mw.innerHTML='';
  const sorted=[...players].sort((a,b)=>b.score-a.score);
  sorted.forEach(p=>{
    const isWin=p.score===maxScore&&maxScore>0;
    const row=document.createElement('div'); row.className='end-winner-row';
    row.style.background=isWin?p.color+'18':'var(--surface2)';
    const avWrap=document.createElement('div'); avWrap.innerHTML=avatarHTML(p,34,'ewr-avatar');
    const left=document.createElement('div'); left.className='ewr-left';
    left.append(avWrap.firstChild);
    const nameEl=document.createElement('div'); nameEl.className='ewr-name'; nameEl.textContent=p.name;
    left.appendChild(nameEl);
    if(isWin&&maxScore>0){
      const badge=document.createElement('span'); badge.className='ewr-badge';
      badge.style.cssText=`background:${p.color}22;color:${p.color}`;
      badge.textContent=scoring==='wins'?'WINNER':'LEADER';
      left.appendChild(badge);
    }
    const sc=document.createElement('div'); sc.className='ewr-score'; sc.style.color=p.color;
    sc.textContent=scoring==='wins'?`${p.score} win${p.score!==1?'s':''}`:`${p.score} pts`;
    row.append(left,sc); mw.appendChild(row);
  });
  document.getElementById('end-modal').classList.add('open');
}

function saveGame(){
  const {players,game,gameName,variantId,variantName,round,scoring,startTime}=gameState;
  const h=getHistory();
  h.unshift({
    id:Date.now(),
    date:new Date(startTime).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    time:new Date(startTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    game,gameName,variantId,variantName,rounds:round,scoring,
    players:players.map(p=>({id:p.id,name:p.name,color:p.color,photo:p.photo||null,score:p.score}))
  });
  saveHistory(h);
  closeEndModal(); finishGame();
  showPage('history');
  showToast('✅ Game saved!');
}

function discardGame(){ closeEndModal(); finishGame(); showPage('setup'); showToast('Game discarded'); }
function closeEndModal(){ document.getElementById('end-modal').classList.remove('open'); }
function finishGame(){ gameState=null; document.getElementById('tab-game').style.display='none'; }

// ══════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════
function renderHistory(){
  const history=getHistory();
  const container=document.getElementById('history-content');
  container.innerHTML='';
  if(!history.length){
    container.innerHTML=`<div class="history-empty"><div class="big">🃏</div>No games saved yet.<br>Play a game and save it to see history here.</div>`;
    return;
  }
  const groups={};
  history.forEach(e=>{ if(!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });
  Object.entries(groups).forEach(([date,entries])=>{
    const group=document.createElement('div'); group.className='history-date-group';
    const lbl=document.createElement('div'); lbl.className='history-date-label'; lbl.textContent=date;
    group.appendChild(lbl);
    entries.forEach(e=>{
      const maxScore=Math.max(...e.players.map(p=>p.score));
      const card=document.createElement('div'); card.className='history-entry';
      const delBtn=document.createElement('button'); delBtn.className='hentry-del'; delBtn.textContent='✕';
      delBtn.onclick=()=>deleteHistoryEntry(e.id);
      const top=document.createElement('div'); top.className='hentry-top';
      top.innerHTML=`<span class="hentry-badge">${e.gameName} · ${e.variantName}</span><span class="hentry-meta">${e.time} · ${e.rounds}R</span>`;
      const plist=document.createElement('div'); plist.className='hentry-players';
      [...e.players].sort((a,b)=>b.score-a.score).forEach(p=>{
        const isWin=p.score===maxScore&&maxScore>0;
        const row=document.createElement('div'); row.className='hentry-row';
        if(isWin) row.style.background=p.color+'14';
        const avWrap=document.createElement('div'); avWrap.innerHTML=avatarHTML(p,24,'hentry-avatar');
        const left=document.createElement('div'); left.className='hentry-left';
        left.append(avWrap.firstChild);
        const nameEl=document.createElement('div'); nameEl.className='hentry-name'; nameEl.textContent=p.name;
        left.appendChild(nameEl);
        if(isWin&&maxScore>0){
          const tag=document.createElement('span'); tag.className='hentry-win-tag';
          tag.style.cssText=`background:${p.color}22;color:${p.color}`;
          tag.textContent=e.scoring==='wins'?'WIN':'TOP';
          left.appendChild(tag);
        }
        const sc=document.createElement('div'); sc.className='hentry-score'; sc.style.color=p.color;
        sc.textContent=e.scoring==='wins'?`${p.score}W`:`${p.score}pts`;
        row.append(left,sc); plist.appendChild(row);
      });
      card.append(top,plist,delBtn); group.appendChild(card);
    });
    container.appendChild(group);
  });
  const clearBtn=document.createElement('button'); clearBtn.className='clear-all-btn'; clearBtn.textContent='Clear All History';
  clearBtn.onclick=()=>{ if(confirm('Clear all history?')){ saveHistory([]); renderHistory(); showToast('History cleared'); } };
  container.appendChild(clearBtn);
}

function deleteHistoryEntry(id){ saveHistory(getHistory().filter(e=>e.id!==id)); renderHistory(); showToast('Entry removed'); }

function hexRgb(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgb(${r}, ${g}, ${b})`; }

        ]},
      ]
    },
  }
};

let rulesGameSel = 'uno';
let rulesVariantSel = 'classic';

function renderRules(){
  // Game tabs
  const gt=document.getElementById('rules-game-tabs');
  gt.innerHTML='';
  Object.entries(GAMES).forEach(([id,g])=>{
    const b=document.createElement('button');
    b.className='rules-game-tab'+(id===rulesGameSel?' active':'');
    b.innerHTML=`<span class="rgt-icon">${g.icon}</span><span class="rgt-name">${g.name}</span>`;
    b.onclick=()=>{ rulesGameSel=id; rulesVariantSel=GAMES[id].variants[0].id; renderRules(); };
    gt.appendChild(b);
  });

  // Variant tabs
  const vt=document.getElementById('rules-variant-tabs');
  vt.innerHTML='';
  GAMES[rulesGameSel].variants.forEach(v=>{
    const b=document.createElement('button');
    b.className='rules-variant-tab'+(v.id===rulesVariantSel?' active':'');
    b.textContent=v.name;
    b.onclick=()=>{ rulesVariantSel=v.id; renderRulesContent(); vt.querySelectorAll('.rules-variant-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
    vt.appendChild(b);
  });

  renderRulesContent();
}

function renderRulesContent(){
  const rc=document.getElementById('rules-content');
  const data=RULES[rulesGameSel]?.[rulesVariantSel];
  if(!data){ rc.innerHTML=`<div class="rules-card"><p style="color:var(--muted);text-align:center;padding:20px">Rules coming soon!</p></div>`; return; }

  let html=`<div class="rules-card">`;
  html+=`<div class="rules-hero">
    <div class="rules-hero-icon">${data.icon}</div>
    <div>
      <div class="rules-hero-title">${data.name}</div>
      <div class="rules-hero-sub">${data.tagline}</div>
    </div>
  </div>`;
  html+=`<div class="rules-badge-row" style="margin-bottom:18px">
    <span class="rules-badge">👥 ${data.players} players</span>
    <span class="rules-badge">🎂 Ages ${data.ages}</span>
    <span class="rules-badge">⏱ ${data.time}</span>
    <span class="rules-badge">🃏 ${data.deck}</span>
  </div>`;

  data.sections.forEach(s=>{
    html+=`<div class="rules-section"><div class="rules-section-title">${s.title}</div>`;
    if(s.body) html+=`<div class="rules-body">${s.body}</div>`;
    if(s.list){
      html+=`<ul class="rules-list">`;
      s.list.forEach(item=>{ html+=`<li>${item}</li>`; });
      html+=`</ul>`;
    }
    if(s.cards){
      html+=`<div class="rules-cards-grid">`;
      s.cards.forEach(c=>{
        html+=`<div class="rules-card-item">
          <div class="rci-name" style="color:${c.color}">${c.name}</div>
          <div class="rci-desc">${c.desc}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  rc.innerHTML=html;
}

// ── INIT ──
renderSetup();

</script>

// Inline service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    const swCode = "\nconst CACHE='scoreboard-v1';\nconst ASSETS=['/'];\nself.addEventListener('install',e=>{self.skipWaiting();});\nself.addEventListener('activate',e=>{self.clients.claim();});\nself.addEventListener('fetch',e=>{\n  e.respondWith(\n    caches.match(e.request).then(cached=>{\n      if(cached) return cached;\n      return fetch(e.request).then(response=>{\n        if(!response||response.status!==200||response.type==='opaque') return response;\n        const clone=response.clone();\n        caches.open(CACHE).then(cache=>cache.put(e.request,clone));\n        return response;\n      }).catch(()=>caches.match('/'));\n    })\n  );\n});\n";
    const blob = new Blob([swCode], {type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
